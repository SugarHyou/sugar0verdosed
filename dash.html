<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>† OVERDOSE ADMIN PANEL †</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #ffccf2; padding: 20px; font-family: sans-serif; }
        .dash-container { width: 100%; max-width: 400px; margin: 0 auto; border: 4px solid #000; background: #fff; }
        .window-title { background: #ff0055; color: white; padding: 8px; font-weight: 900; border-bottom: 4px solid #000; }
        .window-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .section-box { border: 3px solid #000; padding: 10px; background: #f9f9f9; }
        label { display: block; font-weight: 900; margin-bottom: 5px; font-size: 0.8rem; }
        
        .slider-wrap { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: #ff0055; }
        
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { cursor: pointer; border: 2px outset #fff; background: #eee; font-weight: bold; padding: 8px; }
        button:hover { background: #ddd; border: 2px inset #000; }
        
        input[type="text"], textarea { width: 100%; border: 2px solid #000; padding: 8px; box-sizing: border-box; }
        #submit-btn { background: #00ffcc; border: 3px solid #000; font-weight: 900; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="window dash-container">
        <div class="window-title">† Broadcast Console.exe †</div>
        <div class="window-body">
            
            <div class="section-box">
                <label style="color: red;">STRESS</label>
                <div class="slider-wrap">
                    <input type="range" id="stat-stress" min="0" max="100" value="20" oninput="document.getElementById('val-stress').innerText = this.value + '%'">
                    <span id="val-stress">20%</span>
                </div>
            </div>

            <div class="section-box">
                <label style="color: hotpink;">AFFECTION</label>
                <div class="slider-wrap">
                    <input type="range" id="stat-affection" min="0" max="100" value="50" oninput="document.getElementById('val-affection').innerText = this.value + '%'">
                    <span id="val-affection">50%</span>
                </div>
            </div>

            <div class="section-box">
                <label>MODE OVERRIDE</label>
                <div class="mode-grid">
                    <button onclick="saveMode('default')">DEFAULT</button>
                    <button onclick="saveMode('busy')">BUSY</button>
                    <button onclick="saveMode('gaming')">GAMING</button>
                    <button onclick="saveMode('blogging')">BLOGGING</button>
                </div>
            </div>

            <input type="text" id="title" placeholder="Broadcast Title...">
            <textarea id="content" placeholder="What's corrupting your mind?"></textarea>

            <button id="submit-btn" onclick="publishPost()">TRANSMIT TO CORE ⚡</button>
        </div>
    </div>

    <script>
        function saveMode(mode) {
            localStorage.setItem('sugar_mode_request', mode);
            alert("Mode set to: " + mode.toUpperCase());
        }
        
        // Include your publishPost() logic here...
    </script>
</body>
</html>
