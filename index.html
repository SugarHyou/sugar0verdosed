<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SugarOverdosed</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="desktop">

        <div class="profile-side">
            <div class="window" style="min-height: 400px;">
                <div class="window-title">
                    <span>Chat</span>
                    <div class="window-close">X</div>
                </div>

                <div class="window-body" style="display: flex; flex-direction: column;">

                    <div style="padding: 0 0 7px; display: flex; flex-direction: column; gap: 6px; font-size: 0.75rem; font-weight: bold;">
            <!-- Stress Meter -->
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px;">
                <span style="color: red; width: 65px; flex-shrink: 0;">STRESS:</span>
                <div style="flex: 1; height: 12px; background: #eee; border: 1px solid #000; position: relative;">
                    <div id="meter-stress" style="height: 100%; background: linear-gradient(90deg, #ff6666, red); width: 0%;"></div>
                </div>
                <span id="txt-stress" style="width: 30px; text-align: right;">0%</span>
            </div>
            <!-- Affection Meter -->
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px;">
                <span style="color: hotpink; width: 65px; flex-shrink: 0;">AFFECTION:</span>
                <div style="flex: 1; height: 12px; background: #eee; border: 1px solid #000; position: relative;">
                    <div id="meter-affection" style="height: 100%; background: linear-gradient(90deg, #ff99bb, #ff0055); width: 0%;"></div>
                </div>
                <span id="txt-affection" style="width: 30px; text-align: right;">0%</span>
            </div>
            <!-- Mental Darkness Meter -->
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px;">
                <span style="color: #9900ff; width: 65px; flex-shrink: 0;">DARKNESS:</span>
                <div style="flex: 1; height: 12px; background: #eee; border: 1px solid #000; position: relative;">
                    <div id="meter-darkness" style="height: 100%; background: linear-gradient(90deg, #b366ff, #4a0072); width: 0%;"></div>
                </div>
                <span id="txt-darkness" style="width: 30px; text-align: right;">0%</span>
            </div>
        </div>

                    <div class="avatar-container">
                        <img id="sugar-avatar" src="/assets/art/Sugar-(Jul-3-2026).png" alt="[SUGAR-CHAN GRAPHIC]">
                    </div>

                    <div class="dialogue-text-box" id="dialogue-box">
                        Loading...
                    </div>

                    <div class="options-container" id="options-box"></div>

                </div>
            </div>

            <div class="window">
                <div class="window-title">
                    <span>BLOG</span>
                    <div class="window-close">X</div>
                </div>
                <!-- 🌟 Add the id container here -->
                <div class="window-body" id="latest-post-content">
                    Loading latest broadcast...
                </div>
            </div>
        </div>

        <!-- --- MAXIMALIST MAIN OS DASHBOARD --- -->
        <div class="window main-content">
            <div class="window-title">
                <span>🌈 desktop_manifest.exe</span>
                <div class="window-close">X</div>
            </div>

            <!-- This container holds everything side-by-side -->
            <div class="window-body">
                <header style="gap: 15px;">
                    <div class="logo">SugarOverdosed</div>
                    <div>
                        <marquee scrollamount="8">🌈 NEW SITE UUPPP!!! 🌈</marquee>
                    </div>
                    <div style="color: lime;">[ ONLINE ]
                    </div>
                </header>

            </div>


        </div>

    <!-- RIGHT COLUMN: Floating Full Body Character Image -->
    <img src="/assets/art/Sugar-4-(Jul-5-2026).png" alt="[Sugar Full Body]"
        style="max-height: 100%; margin: 0 -100px; animation: floatCharacter 2.5s ease-in-out infinite;">
    </div>

    <script src="script.js"></script>
</body>

</html>
